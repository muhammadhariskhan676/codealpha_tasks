<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SocialMini</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ─── Design Tokens ─────────────────────────────── */
    :root {
      --bg:        #0d0f14;
      --surface:   #151820;
      --surface2:  #1c2030;
      --border:    #252a3a;
      --accent:    #6c63ff;
      --accent2:   #ff6584;
      --accent3:   #43e97b;
      --text:      #e8ecf4;
      --muted:     #7b84a0;
      --danger:    #ff4d6d;
      --radius:    14px;
      --shadow:    0 8px 32px rgba(0,0,0,0.4);
      --font:      'Sora', sans-serif;
      --mono:      'JetBrains Mono', monospace;
    }

    /* ─── Reset & Base ──────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--accent); text-decoration: none; }
    button { cursor: pointer; font-family: var(--font); border: none; outline: none; }
    input, textarea { font-family: var(--font); outline: none; border: none; }
    img { display: block; }

    /* ─── Scrollbar ─────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ─── Utilities ─────────────────────────────────── */
    .hidden { display: none !important; }
    .flex { display: flex; }
    .flex-col { flex-direction: column; }
    .items-center { align-items: center; }
    .gap-1 { gap: 8px; }
    .gap-2 { gap: 16px; }

    /* ─── Auth Screen ───────────────────────────────── */
    #auth-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at 30% 20%, #1a1560 0%, transparent 55%),
                  radial-gradient(ellipse at 80% 70%, #1a0030 0%, transparent 55%),
                  var(--bg);
    }
    .auth-box {
      width: 100%;
      max-width: 420px;
      padding: 48px 40px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow), 0 0 80px rgba(108,99,255,0.08);
      animation: fadeUp 0.5s ease;
    }
    .auth-logo {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .auth-subtitle { color: var(--muted); font-size: 14px; margin-bottom: 32px; }
    .auth-tabs {
      display: flex;
      background: var(--bg);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 28px;
    }
    .auth-tab {
      flex: 1;
      padding: 8px;
      text-align: center;
      font-size: 14px;
      font-weight: 500;
      border-radius: 8px;
      color: var(--muted);
      background: transparent;
      transition: all 0.2s;
    }
    .auth-tab.active {
      background: var(--surface2);
      color: var(--text);
    }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .form-input {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 15px;
      transition: border-color 0.2s;
    }
    .form-input:focus { border-color: var(--accent); }
    .form-input::placeholder { color: var(--muted); }
    .btn-primary {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, var(--accent), #5a52e0);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      border-radius: 10px;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 8px;
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .auth-error {
      padding: 10px 14px;
      background: rgba(255,77,109,0.12);
      border: 1px solid rgba(255,77,109,0.3);
      border-radius: 8px;
      color: var(--danger);
      font-size: 13px;
      margin-bottom: 16px;
    }

    /* ─── App Shell ─────────────────────────────────── */
    #app-screen { display: flex; min-height: 100vh; }

    /* Sidebar */
    .sidebar {
      width: 260px;
      flex-shrink: 0;
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 28px 20px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      overflow-y: auto;
    }
    .sidebar-logo {
      font-size: 22px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 28px;
      padding-left: 10px;
    }
    .nav-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 14px;
      border-radius: 12px;
      color: var(--muted);
      font-size: 15px;
      font-weight: 500;
      background: transparent;
      width: 100%;
      text-align: left;
      transition: all 0.18s;
    }
    .nav-btn:hover { background: var(--surface2); color: var(--text); }
    .nav-btn.active { background: rgba(108,99,255,0.15); color: var(--accent); }
    .nav-btn .nav-icon { font-size: 20px; width: 24px; text-align: center; }
    .sidebar-spacer { flex: 1; }
    .sidebar-user {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.18s;
      border: 1px solid var(--border);
    }
    .sidebar-user:hover { background: var(--surface2); }
    .sidebar-user-info { flex: 1; min-width: 0; }
    .sidebar-user-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sidebar-user-handle { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* Main content */
    .main-content {
      margin-left: 260px;
      flex: 1;
      max-width: 640px;
      padding: 0;
      border-right: 1px solid var(--border);
    }
    .page-header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(13,15,20,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 18px 24px;
    }
    .page-header h2 { font-size: 18px; font-weight: 700; }
    .page-body { padding: 0; }

    /* Right panel */
    .right-panel {
      width: 320px;
      flex-shrink: 0;
      padding: 24px 20px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }

    /* ─── Post Composer ──────────────────────────────── */
    .composer {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 14px;
    }
    .composer-avatar { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
    .composer-body { flex: 1; }
    .composer-textarea {
      width: 100%;
      background: transparent;
      color: var(--text);
      font-size: 16px;
      resize: none;
      line-height: 1.5;
      min-height: 60px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 12px;
      transition: border-color 0.2s;
    }
    .composer-textarea:focus { border-color: var(--accent); }
    .composer-textarea::placeholder { color: var(--muted); }
    .composer-footer { display: flex; align-items: center; justify-content: space-between; }
    .char-count { font-size: 12px; color: var(--muted); font-family: var(--mono); }
    .char-count.warn { color: var(--accent2); }
    .char-count.danger { color: var(--danger); }
    .btn-post {
      padding: 8px 20px;
      background: linear-gradient(135deg, var(--accent), #5a52e0);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      border-radius: 20px;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn-post:hover { opacity: 0.9; }
    .btn-post:active { transform: scale(0.97); }
    .btn-post:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ─── Feed Tabs ──────────────────────────────────── */
    .feed-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
    }
    .feed-tab {
      flex: 1;
      padding: 14px;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
      background: transparent;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .feed-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .feed-tab:hover:not(.active) { color: var(--text); background: rgba(255,255,255,0.03); }

    /* ─── Post Card ──────────────────────────────────── */
    .post-card {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 14px;
      transition: background 0.15s;
      animation: fadeIn 0.3s ease;
    }
    .post-card:hover { background: rgba(255,255,255,0.02); }
    .post-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      cursor: pointer;
    }
    .post-body { flex: 1; min-width: 0; }
    .post-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
    .post-display-name { font-weight: 600; font-size: 15px; cursor: pointer; }
    .post-display-name:hover { color: var(--accent); }
    .post-username { font-size: 13px; color: var(--muted); }
    .post-dot { color: var(--muted); font-size: 13px; }
    .post-time { font-size: 13px; color: var(--muted); }
    .post-content { font-size: 15px; line-height: 1.65; margin-bottom: 14px; white-space: pre-wrap; word-break: break-word; }
    .post-image { width: 100%; border-radius: 12px; max-height: 300px; object-fit: cover; margin-bottom: 14px; }
    .post-actions { display: flex; gap: 20px; }
    .action-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--muted);
      background: transparent;
      padding: 4px 0;
      transition: color 0.18s;
    }
    .action-btn:hover { color: var(--text); }
    .action-btn.liked { color: var(--accent2); }
    .action-btn.liked .action-icon { animation: heartPop 0.3s ease; }
    .action-icon { font-size: 18px; }
    .post-delete {
      margin-left: auto;
      color: var(--muted);
      background: transparent;
      font-size: 18px;
      padding: 4px;
      border-radius: 6px;
      transition: color 0.18s, background 0.18s;
    }
    .post-delete:hover { color: var(--danger); background: rgba(255,77,109,0.1); }

    /* ─── Comments Section ───────────────────────────── */
    .comments-section {
      padding: 0 24px 16px;
      border-bottom: 1px solid var(--border);
      display: none;
    }
    .comments-section.open { display: block; }
    .comment-composer {
      display: flex;
      gap: 10px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 8px;
    }
    .comment-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 8px 16px;
      color: var(--text);
      font-size: 14px;
      transition: border-color 0.2s;
    }
    .comment-input:focus { border-color: var(--accent); }
    .comment-input::placeholder { color: var(--muted); }
    .btn-comment {
      padding: 8px 14px;
      background: var(--accent);
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      border-radius: 20px;
      transition: opacity 0.2s;
    }
    .btn-comment:hover { opacity: 0.85; }
    .comment-item {
      display: flex;
      gap: 10px;
      padding: 8px 0;
      animation: fadeIn 0.2s ease;
    }
    .comment-avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
    .comment-body { flex: 1; }
    .comment-author { font-size: 13px; font-weight: 600; margin-bottom: 2px; cursor: pointer; }
    .comment-author:hover { color: var(--accent); }
    .comment-text { font-size: 14px; color: var(--text); line-height: 1.5; }
    .comment-time { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* ─── Profile Page ───────────────────────────────── */
    .profile-banner {
      height: 160px;
      background: linear-gradient(135deg, #1a1560, #2d0050, #0d2060);
      position: relative;
    }
    .profile-info-section {
      padding: 0 24px 24px;
      border-bottom: 1px solid var(--border);
    }
    .profile-avatar-wrap {
      position: relative;
      display: inline-block;
      margin-top: -48px;
      margin-bottom: 12px;
    }
    .profile-avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      border: 4px solid var(--bg);
      object-fit: cover;
    }
    .profile-header-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .profile-display-name { font-size: 22px; font-weight: 700; margin-bottom: 2px; }
    .profile-username-text { font-size: 14px; color: var(--muted); margin-bottom: 12px; }
    .profile-bio { font-size: 15px; line-height: 1.6; margin-bottom: 14px; color: var(--text); }
    .profile-stats { display: flex; gap: 24px; }
    .stat-item { text-align: center; cursor: pointer; }
    .stat-num { font-size: 18px; font-weight: 700; }
    .stat-label { font-size: 12px; color: var(--muted); }
    .btn-follow {
      padding: 9px 22px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .btn-follow.not-following {
      background: var(--text);
      color: var(--bg);
    }
    .btn-follow.following {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }
    .btn-follow.following:hover { border-color: var(--danger); color: var(--danger); }
    .btn-edit-profile {
      padding: 9px 22px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      transition: all 0.2s;
    }
    .btn-edit-profile:hover { background: var(--surface2); }

    /* ─── Search ─────────────────────────────────────── */
    .search-bar-wrap {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
    }
    .search-input-wrap { position: relative; }
    .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 16px; color: var(--muted); pointer-events: none; }
    .search-input {
      width: 100%;
      padding: 10px 16px 10px 40px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 24px;
      color: var(--text);
      font-size: 15px;
      transition: border-color 0.2s;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--muted); }
    .user-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
      cursor: pointer;
      animation: fadeIn 0.2s ease;
    }
    .user-card:hover { background: rgba(255,255,255,0.03); }
    .user-card-avatar { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; }
    .user-card-info { flex: 1; min-width: 0; }
    .user-card-name { font-weight: 600; font-size: 15px; margin-bottom: 2px; }
    .user-card-handle { font-size: 13px; color: var(--muted); }
    .user-card-bio { font-size: 13px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .btn-follow-sm {
      padding: 6px 16px;
      border-radius: 16px;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .btn-follow-sm.not-following { background: var(--text); color: var(--bg); }
    .btn-follow-sm.following { background: transparent; border: 1px solid var(--border); color: var(--text); }

    /* ─── Right Panel Widgets ────────────────────────── */
    .widget {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 20px;
    }
    .widget-header {
      padding: 14px 18px;
      font-size: 15px;
      font-weight: 700;
      border-bottom: 1px solid var(--border);
    }
    .widget-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 18px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s;
    }
    .widget-item:last-child { border-bottom: none; }
    .widget-item:hover { background: var(--surface2); }
    .widget-avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; }
    .widget-name { font-size: 14px; font-weight: 600; }
    .widget-handle { font-size: 12px; color: var(--muted); }

    /* ─── Loading & Empty States ─────────────────────── */
    .loading {
      text-align: center;
      padding: 48px 24px;
      color: var(--muted);
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 16px;
    }
    .empty-state {
      text-align: center;
      padding: 64px 24px;
      color: var(--muted);
    }
    .empty-icon { font-size: 48px; margin-bottom: 16px; }
    .empty-title { font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
    .empty-subtitle { font-size: 14px; }

    /* ─── Toast ──────────────────────────────────────── */
    #toast-container {
      position: fixed;
      bottom: 28px;
      right: 28px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .toast {
      padding: 12px 20px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-left: 4px solid var(--accent);
      border-radius: 10px;
      font-size: 14px;
      color: var(--text);
      box-shadow: var(--shadow);
      animation: slideIn 0.3s ease;
      max-width: 320px;
    }
    .toast.error { border-left-color: var(--danger); }
    .toast.success { border-left-color: var(--accent3); }

    /* ─── Modal ──────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      animation: fadeIn 0.2s ease;
    }
    .modal-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      width: 100%;
      max-width: 440px;
      box-shadow: var(--shadow);
      animation: fadeUp 0.3s ease;
    }
    .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 24px; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }
    .btn-cancel {
      padding: 9px 18px;
      border-radius: 10px;
      background: var(--surface2);
      color: var(--text);
      font-size: 14px;
      font-weight: 500;
      transition: background 0.2s;
    }
    .btn-cancel:hover { background: var(--border); }
    .btn-save {
      padding: 9px 20px;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    .btn-save:hover { opacity: 0.88; }

    /* ─── Animations ─────────────────────────────────── */
    @keyframes fadeIn   { from { opacity: 0; } to { opacity: 1; } }
    @keyframes fadeUp   { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideIn  { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes spin     { to { transform: rotate(360deg); } }
    @keyframes heartPop { 0%,100% { transform: scale(1); } 50% { transform: scale(1.4); } }

    /* ─── Responsive ─────────────────────────────────── */
    @media (max-width: 1100px) { .right-panel { display: none; } }
    @media (max-width: 760px) {
      .sidebar { width: 64px; padding: 20px 10px; }
      .nav-btn span:not(.nav-icon), .sidebar-logo, .sidebar-user-info { display: none; }
      .sidebar-user { justify-content: center; padding: 10px; }
      .main-content { margin-left: 64px; }
    }
  </style>
</head>
<body>

<!-- ══ AUTH SCREEN ══════════════════════════════════════ -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">✦ SocialMini</div>
    <div class="auth-subtitle">A simple place to share moments</div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuthTab('login')">Sign In</button>
      <button class="auth-tab" onclick="switchAuthTab('register')">Sign Up</button>
    </div>
    <div id="auth-error" class="auth-error hidden"></div>

    <!-- Login Form -->

      <div class="form-group">

      <div class="form-group">
        <label class="form-label">Password</label>

    <!-- Register Form -->
    <div id="register-form" class="hidden">

        <label class="form-label">Display Name</label>
        <input id="reg-displayname" class="form-input" type="text" placeholder="Your Name" />

      <div class="form-group">
        <label class="form-label">Email</label>
        <input id="reg-email" class="form-input" type="email" placeholder="you@email.com" />

      <span class="nav-icon">👤</span><span>Profile</span>

            <span class="char-count" id="char-count">0 / 500</span>
            <button class="btn-post" id="post-btn" onclick="submitPost()">Post</button>

        <button class="feed-tab active" onclick="switchFeed('feed', this)">Following</button>
        <button class="feed-tab" onclick="switchFeed('explore', this)">Explore</button>

<!-- ══ TOAST CONTAINER ═════════════════════════════════ -->
<div id="toast-container"></div>

<!-- ══ EDIT PROFILE MODAL ══════════════════════════════ -->
<div id="edit-modal" class="modal-overlay hidden">
  <div class="modal-box">
    <div class="modal-title">Edit Profile</div>
    <div class="form-group">
      <label class="form-label">Display Name</label>
      <input id="edit-displayname" class="form-input" type="text" />
    </div>
    <div class="form-group">
      <label class="form-label">Bio</label>
      <textarea id="edit-bio" class="form-input" rows="3" style="resize:none;" placeholder="Tell us about yourself..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeEditModal()">Cancel</button>
      <button class="btn-save" onclick="saveProfile()">Save Changes</button>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════════════ */
const API = '';   // same origin
let token = localStorage.getItem('sm_token') || null;
let currentUser = null;
let currentFeedType = 'feed';
let searchDebounce = null;

/* ═══════════════════════════════════════════════════════
   API HELPERS
══════════════════════════════════════════════════════════ */
async function api(method, path, body) {
  const headers = { 'Content-Type': 'application/json' };
  if (token) headers['Authorization'] = `Bearer ${token}`;
  const res = await fetch(API + path, {
    method,
    headers,
    body: body ? JSON.stringify(body) : undefined,
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Something went wrong');
  return data;
}
const GET = (path) => api('GET', path);
const POST = (path, body) => api('POST', path, body);
const PUT = (path, body) => api('PUT', path, body);
const DELETE = (path) => api('DELETE', path);

/* ═══════════════════════════════════════════════════════
   TOAST
══════════════════════════════════════════════════════════ */
function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

/* ═══════════════════════════════════════════════════════
   AUTH
══════════════════════════════════════════════════════════ */
function switchAuthTab(tab) {
  document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
  document.getElementById('register-form').classList.toggle('hidden', tab !== 'register');
  document.getElementById('auth-error').classList.add('hidden');
  document.querySelectorAll('.auth-tab').forEach((el, i) => {
    el.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
  });
}

function showAuthError(msg) {
  const el = document.getElementById('auth-error');
  el.textContent = msg;
  el.classList.remove('hidden');
}

async function handleLogin() {
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value;
  if (!username || !password) return showAuthError('Please fill in all fields');
  try {
    const data = await POST('/api/auth/login', { username, password });
    token = data.token;
    currentUser = data.user;
    localStorage.setItem('sm_token', token);
    enterApp();
  } catch (e) {
    showAuthError(e.message);
  }
}

async function handleRegister() {
  const username = document.getElementById('reg-username').value.trim();
  const displayName = document.getElementById('reg-displayname').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  if (!username || !email || !password) return showAuthError('Please fill in all required fields');
  try {
    const data = await POST('/api/auth/register', { username, displayName, email, password });
    token = data.token;
    currentUser = data.user;
    localStorage.setItem('sm_token', token);
    enterApp();
  } catch (e) {
    showAuthError(e.message);
  }
}

function handleLogout() {
  token = null;
  currentUser = null;
  localStorage.removeItem('sm_token');
  document.getElementById('auth-screen').classList.remove('hidden');
  document.getElementById('app-screen').classList.add('hidden');
}

/* ═══════════════════════════════════════════════════════
   APP INIT
══════════════════════════════════════════════════════════ */
async function enterApp() {
  document.getElementById('auth-screen').classList.add('hidden');
  document.getElementById('app-screen').classList.remove('hidden');
  if (!currentUser) {
    try { currentUser = await GET('/api/users/me'); } catch { return handleLogout(); }
  }
  // Populate sidebar
  document.getElementById('sidebar-avatar').src = currentUser.avatar;
  document.getElementById('sidebar-display-name').textContent = currentUser.displayName;
  document.getElementById('sidebar-username').textContent = '@' + currentUser.username;
  document.getElementById('composer-avatar').src = currentUser.avatar;
  showPage('home');
  loadSuggestions();
}

/* ═══════════════════════════════════════════════════════
   PAGE ROUTING
══════════════════════════════════════════════════════════ */
function showPage(page, param) {
  ['home', 'explore', 'profile'].forEach(p => {
    document.getElementById('page-' + p).classList.toggle('hidden', p !== page);
  });
  document.querySelectorAll('.nav-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.page === page);
  });
  if (page === 'home') loadFeed(currentFeedType);
  if (page === 'explore') loadSearch('');
  if (page === 'profile') loadProfile(param || currentUser.username);
}

/* ═══════════════════════════════════════════════════════
   FEED
══════════════════════════════════════════════════════════ */
async function loadFeed(type = 'feed') {
  currentFeedType = type;
  const container = document.getElementById('feed-container');
  container.innerHTML = loadingHTML();
  try {
    const posts = await GET(`/api/posts/${type}`);
    if (!posts.length) {
      container.innerHTML = emptyState('🌱', type === 'feed' ? 'Your feed is empty' : 'No posts yet', type === 'feed' ? 'Follow some people to see their posts here' : 'Be the first to post something!');
      return;
    }
    container.innerHTML = posts.map(renderPost).join('');
  } catch (e) {
    container.innerHTML = emptyState('⚠️', 'Failed to load', e.message);
  }
}

function switchFeed(type, btn) {
  document.querySelectorAll('.feed-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadFeed(type);
}

function renderPost(post) {
  const time = timeAgo(post.createdAt);
  const isOwn = post.authorId === currentUser.id;
  return `
    <div class="post-card" id="post-${post.id}">
      <img src="${post.author?.avatar || ''}" class="post-avatar" alt="" onclick="showPage('profile','${post.author?.username}')" />
      <div class="post-body">
        <div class="post-header">
          <span class="post-display-name" onclick="showPage('profile','${post.author?.username}')">${esc(post.author?.displayName || 'Unknown')}</span>
          <span class="post-username">@${esc(post.author?.username || '')}</span>
          <span class="post-dot">·</span>
          <span class="post-time">${time}</span>
          ${isOwn ? `<button class="post-delete" onclick="deletePost('${post.id}')" title="Delete">🗑</button>` : ''}
        </div>
        <div class="post-content">${esc(post.content)}</div>
        ${post.image ? `<img src="${post.image}" class="post-image" alt="" />` : ''}
        <div class="post-actions">
          <button class="action-btn ${post.liked ? 'liked' : ''}" id="like-btn-${post.id}" onclick="toggleLike('${post.id}')">
            <span class="action-icon">${post.liked ? '❤️' : '🤍'}</span>
            <span id="like-count-${post.id}">${post.likeCount}</span>
          </button>
          <button class="action-btn" onclick="toggleComments('${post.id}')">
            <span class="action-icon">💬</span>
            <span id="comment-count-${post.id}">${post.commentCount}</span>
          </button>
        </div>
      </div>
    </div>
    <div class="comments-section" id="comments-${post.id}">
      <div class="comment-composer">
        <img src="${currentUser.avatar}" class="comment-avatar" alt="" />
        <input class="comment-input" id="comment-input-${post.id}" type="text" placeholder="Write a comment..." onkeydown="if(event.key==='Enter') submitComment('${post.id}')" />
        <button class="btn-comment" onclick="submitComment('${post.id}')">Post</button>
      </div>
      <div id="comments-list-${post.id}"></div>
    </div>
  `;
}

/* ═══════════════════════════════════════════════════════
   POST ACTIONS
══════════════════════════════════════════════════════════ */
function updateCharCount() {
  const val = document.getElementById('post-input').value;
  const el = document.getElementById('char-count');
  el.textContent = `${val.length} / 500`;
  el.className = 'char-count' + (val.length > 450 ? (val.length > 490 ? ' danger' : ' warn') : '');
  document.getElementById('post-btn').disabled = !val.trim();
}

async function submitPost() {
  const content = document.getElementById('post-input').value.trim();
  if (!content) return;
  document.getElementById('post-btn').disabled = true;
  try {
    const post = await POST('/api/posts', { content });
    document.getElementById('post-input').value = '';
    updateCharCount();
    // Prepend to feed
    const container = document.getElementById('feed-container');
    const empty = container.querySelector('.empty-state');
    if (empty) container.innerHTML = '';
    container.insertAdjacentHTML('afterbegin', renderPost(post));
    toast('Posted!', 'success');
  } catch (e) {
    toast(e.message, 'error');
  } finally {
    document.getElementById('post-btn').disabled = false;
  }
}

async function deletePost(postId) {
  if (!confirm('Delete this post?')) return;
  try {
    await DELETE(`/api/posts/${postId}`);
    document.getElementById('post-' + postId)?.remove();
    document.getElementById('comments-' + postId)?.remove();
    toast('Post deleted', 'success');
  } catch (e) {
    toast(e.message, 'error');
  }
}

async function toggleLike(postId) {
  try {
    const data = await POST(`/api/posts/${postId}/like`);
    const btn = document.getElementById(`like-btn-${postId}`);
    const count = document.getElementById(`like-count-${postId}`);
    if (btn) {
      btn.className = `action-btn ${data.liked ? 'liked' : ''}`;
      btn.querySelector('.action-icon').textContent = data.liked ? '❤️' : '🤍';
      if (count) count.textContent = data.likeCount;
    }
  } catch (e) {
    toast(e.message, 'error');
  }
}

/* ═══════════════════════════════════════════════════════
   COMMENTS
══════════════════════════════════════════════════════════ */
async function toggleComments(postId) {
  const section = document.getElementById(`comments-${postId}`);
  if (!section) return;
  const isOpen = section.classList.contains('open');
  if (!isOpen) {
    section.classList.add('open');
    await loadComments(postId);
  } else {
    section.classList.remove('open');
  }
}

async function loadComments(postId) {
  const list = document.getElementById(`comments-list-${postId}`);
  if (!list) return;
  list.innerHTML = '<div style="padding:8px;color:var(--muted);font-size:13px;">Loading...</div>';
  try {
    const comments = await GET(`/api/posts/${postId}/comments`);
    if (!comments.length) {
      list.innerHTML = '<div style="padding:8px;color:var(--muted);font-size:13px;">No comments yet. Be first!</div>';
      return;
    }
    list.innerHTML = comments.map(c => `
      <div class="comment-item" id="comment-item-${c.id}">
        <img src="${c.author?.avatar || ''}" class="comment-avatar" alt="" />
        <div class="comment-body">
          <div class="comment-author" onclick="showPage('profile','${c.author?.username}')">${esc(c.author?.displayName || 'Unknown')}</div>
          <div class="comment-text">${esc(c.content)}</div>
          <div class="comment-time">${timeAgo(c.createdAt)}</div>
        </div>
      </div>
    `).join('');
  } catch { list.innerHTML = ''; }
}

async function submitComment(postId) {
  const input = document.getElementById(`comment-input-${postId}`);
  const content = input?.value.trim();
  if (!content) return;
  try {
    const comment = await POST(`/api/posts/${postId}/comments`, { content });
    input.value = '';
    // Update count
    const countEl = document.getElementById(`comment-count-${postId}`);
    if (countEl) countEl.textContent = parseInt(countEl.textContent || '0') + 1;
    // Append comment
    const list = document.getElementById(`comments-list-${postId}`);
    const noComment = list?.querySelector('div[style]');
    if (noComment) noComment.remove();
    list?.insertAdjacentHTML('beforeend', `
      <div class="comment-item" id="comment-item-${comment.id}">
        <img src="${currentUser.avatar}" class="comment-avatar" alt="" />
        <div class="comment-body">
          <div class="comment-author">${esc(currentUser.displayName)}</div>
          <div class="comment-text">${esc(comment.content)}</div>
          <div class="comment-time">Just now</div>
        </div>
      </div>
    `);
  } catch (e) {
    toast(e.message, 'error');
  }
}

/* ═══════════════════════════════════════════════════════
   PROFILE
══════════════════════════════════════════════════════════ */
async function loadProfile(username) {
  const container = document.getElementById('profile-content');
  container.innerHTML = loadingHTML();
  try {
    const [user, posts] = await Promise.all([
      GET(`/api/users/${username}`),
      GET(`/api/posts/user/${username}`)
    ]);
    const isMe = user.id === currentUser.id;
    container.innerHTML = `
      <div class="profile-banner"></div>
      <div class="profile-info-section">
        <div class="profile-header-row">
          <div class="profile-avatar-wrap">
            <img src="${user.avatar}" class="profile-avatar" alt="" />
          </div>
          <div style="margin-top:12px;">
            ${isMe
              ? `<button class="btn-edit-profile" onclick="openEditModal()">Edit Profile</button>`
              : `<button class="btn-follow ${user.isFollowing ? 'following' : 'not-following'}" id="follow-btn-${user.id}" onclick="toggleFollow('${user.username}', '${user.id}')">
                  ${user.isFollowing ? 'Following' : 'Follow'}
                </button>`}
          </div>
        </div>
        <div class="profile-display-name">${esc(user.displayName)}</div>
        <div class="profile-username-text">@${esc(user.username)}</div>
        ${user.bio ? `<div class="profile-bio">${esc(user.bio)}</div>` : ''}
        <div class="profile-stats">
          <div class="stat-item">
            <div class="stat-num">${posts.length}</div>
            <div class="stat-label">Posts</div>
          </div>
          <div class="stat-item" id="stat-followers-${user.id}" onclick="showPage('profile','${username}')">
            <div class="stat-num" id="follower-count-${user.id}">${user.followerCount}</div>
            <div class="stat-label">Followers</div>
          </div>
          <div class="stat-item">
            <div class="stat-num">${user.followingCount}</div>
            <div class="stat-label">Following</div>
          </div>
        </div>
      </div>
      <div id="profile-posts">
        ${posts.length
          ? posts.map(renderPost).join('')
          : emptyState('📝', 'No posts yet', isMe ? "Share something with the world!" : `${user.displayName} hasn't posted yet.`)}
      </div>
    `;
  } catch (e) {
    container.innerHTML = emptyState('⚠️', 'User not found', e.message);
  }
}

async function toggleFollow(username, userId) {
  try {
    const data = await POST(`/api/users/${username}/follow`);
    const btn = document.getElementById(`follow-btn-${userId}`);
    if (btn) {
      btn.className = `btn-follow ${data.following ? 'following' : 'not-following'}`;
      btn.textContent = data.following ? 'Following' : 'Follow';
    }
    const countEl = document.getElementById(`follower-count-${userId}`);
    if (countEl) countEl.textContent = data.followerCount;
    toast(data.following ? 'Following!' : 'Unfollowed', 'success');
  } catch (e) {
    toast(e.message, 'error');
  }
}

/* ═══════════════════════════════════════════════════════
   SEARCH
══════════════════════════════════════════════════════════ */
function handleSearch(q) {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(() => loadSearch(q), 300);
}

async function loadSearch(q) {
  const container = document.getElementById('search-results');
  if (!q.trim()) {
    container.innerHTML = emptyState('🔍', 'Find people', 'Search by username or display name');
    return;
  }
  container.innerHTML = loadingHTML();
  try {
    const users = await GET(`/api/users/search?q=${encodeURIComponent(q)}`);
    if (!users.length) {
      container.innerHTML = emptyState('😕', 'No results', `Nobody found for "${q}"`);
      return;
    }
    container.innerHTML = users.map(u => `
      <div class="user-card" onclick="showPage('profile','${u.username}')">
        <img src="${u.avatar}" class="user-card-avatar" alt="" />
        <div class="user-card-info">
          <div class="user-card-name">${esc(u.displayName)}</div>
          <div class="user-card-handle">@${esc(u.username)}</div>
          ${u.bio ? `<div class="user-card-bio">${esc(u.bio)}</div>` : ''}
        </div>
        ${u.isMe ? '' : `<button class="btn-follow-sm ${u.isFollowing ? 'following' : 'not-following'}" id="search-follow-${u.id}"
          onclick="event.stopPropagation(); toggleFollowSearch('${u.username}','${u.id}')">
          ${u.isFollowing ? 'Following' : 'Follow'}
        </button>`}
      </div>
    `).join('');
  } catch (e) {
    container.innerHTML = emptyState('⚠️', 'Error', e.message);
  }
}

async function toggleFollowSearch(username, userId) {
  try {
    const data = await POST(`/api/users/${username}/follow`);
    const btn = document.getElementById(`search-follow-${userId}`);
    if (btn) {
      btn.className = `btn-follow-sm ${data.following ? 'following' : 'not-following'}`;
      btn.textContent = data.following ? 'Following' : 'Follow';
    }
  } catch (e) {
    toast(e.message, 'error');
  }
}

/* ═══════════════════════════════════════════════════════
   SUGGESTIONS
══════════════════════════════════════════════════════════ */
async function loadSuggestions() {
  try {
    const users = await GET('/api/users/search?q=a');
    const list = document.getElementById('suggestions-list');
    const filtered = users.filter(u => !u.isMe && !u.isFollowing).slice(0, 4);
    if (!filtered.length) { list.innerHTML = '<div style="padding:14px 18px;color:var(--muted);font-size:13px;">No suggestions yet</div>'; return; }
    list.innerHTML = filtered.map(u => `
      <div class="widget-item" onclick="showPage('profile','${u.username}')">
        <img src="${u.avatar}" class="widget-avatar" alt="" />
        <div style="flex:1;min-width:0;">
          <div class="widget-name">${esc(u.displayName)}</div>
          <div class="widget-handle">@${esc(u.username)}</div>
        </div>
        <button class="btn-follow-sm not-following" onclick="event.stopPropagation();toggleFollowSearch('${u.username}','${u.id}')">Follow</button>
      </div>
    `).join('');
  } catch { /* suggestions are optional */ }
}

/* ═══════════════════════════════════════════════════════
   EDIT PROFILE MODAL
══════════════════════════════════════════════════════════ */
function openEditModal() {
  document.getElementById('edit-displayname').value = currentUser.displayName || '';
  document.getElementById('edit-bio').value = currentUser.bio || '';
  document.getElementById('edit-modal').classList.remove('hidden');
}
function closeEditModal() {
  document.getElementById('edit-modal').classList.add('hidden');
}
async function saveProfile() {
  const displayName = document.getElementById('edit-displayname').value.trim();
  const bio = document.getElementById('edit-bio').value.trim();
  try {
    const updated = await PUT('/api/users/me', { displayName, bio });
    currentUser = { ...currentUser, ...updated };
    document.getElementById('sidebar-display-name').textContent = currentUser.displayName;
    closeEditModal();
    loadProfile(currentUser.username);
    toast('Profile updated!', 'success');
  } catch (e) {
    toast(e.message, 'error');
  }
}

/* ═══════════════════════════════════════════════════════
   HELPERS
══════════════════════════════════════════════════════════ */
function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function timeAgo(dateStr) {
  const diff = (Date.now() - new Date(dateStr)) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return `${Math.floor(diff/60)}m`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h`;
  if (diff < 604800) return `${Math.floor(diff/86400)}d`;
  return new Date(dateStr).toLocaleDateString();
}

function loadingHTML() {
  return `<div class="loading"><div class="spinner"></div>Loading...</div>`;
}

function emptyState(icon, title, subtitle) {
  return `<div class="empty-state"><div class="empty-icon">${icon}</div><div class="empty-title">${title}</div><div class="empty-subtitle">${subtitle}</div></div>`;
}

// Enter / Escape key shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeEditModal();
});

(async () => {
  if (token) {
    try {
      currentUser = await GET('/api/users/me');
      enterApp();
    } catch {
      token = null;
      localStorage.removeItem('sm_token');
    }
  }
})();
</script>
